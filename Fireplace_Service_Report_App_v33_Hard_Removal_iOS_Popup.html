  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1, h2, h3, h4 {
      margin-top: 20px;
    }
    button {
      margin: 3px 3px 3px 0;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    label {
      display: block;
      margin-top: 8px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
      margin-bottom: 4px;
    }
    textarea {
      width: 100%;
      min-height: 240px; /* larger default so lines aren't cut off on mobile */
      resize: vertical;
      box-sizing: border-box;
    }
    textarea.is-editing {
      min-height: 65vh; /* expand while editing for better visibility on mobile */
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .flex-row > div {
      flex: 1 1 200px;
    }
    .section {
      margin-top: 30px;
      padding-top: 10px;
      border-top: 1px solid #ccc;
    }
    .hr-space {
      margin-top: 18px;
      margin-bottom: 10px;
      border: none;
      border-top: 1px solid #ccc;
    }
    #headerBar {
      text-align: center;
      margin-bottom: 15px;
    }
    #headerBar img {
      max-width: 350px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 8px auto;
    }
    #contactInfo {
      font-size: 0.95em;
      line-height: 1.4;
    }
    #listBox {
      margin-top: 10px;
    }
    #selectedBox {
      width: 100%;
      height: 150px;
    }
    .item {
      margin: 4px 0;
    }
    .helper-buttons {
      margin: 4px 0 8px 0;
    }
    .helper-buttons span {
      display: inline-block;
      margin-bottom: 2px;
      font-size: 0.8rem;
      font-style: italic;
      color: #555;
    }
    .fireplace-section, .dryer-section {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 4px;
    }
    .fireplace-section h3, .dryer-section h3 {
      margin-top: 0;
    }
    .rec-est-section h4 {
      margin-top: 0;
    }
    .helper-print-note {
      font-size: 0.9em;
      color: #666;
    }

    /* Lined backgrounds for Recommendations / Estimates pairing */
    .lined {
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 18px,
        #dddddd 19px
      );
      background-size: 100% 20px;
    }


    /* Auto-growing textareas */
    textarea.autosize {
      overflow: hidden;
      resize: none;
      min-height: 70px;
    }

    /*  */
    #photoList { display: flex; flex-direction: column; gap: 12px; }
    .photo-page{ display:flex; flex-direction:column; gap:12px; }
    .photo-item { border: 1px solid #ddd; padding: 10px; border-radius: 4px; }
    .photo-item img { max-width: 100%; height: auto; border-radius: 4px; display: block; margin-bottom: 8px; }
    .photo-caption-display { font-size: 0.95em; margin-top: 6px; white-space: pre-wrap; }
    .photo-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    @media print {
      .photo-controls { display: none !important; }
      .photo-caption-input { display: none !important; }
      .photo-remove-btn { display: none !important; }
